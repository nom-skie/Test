<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC105 | Ultimate 20-Question Quiz</title>
    <style>
        :root {
            --primary: #4f46e5; 
            --secondary: #6366f1; 
            --bg: #f8fafc;
            --card: #ffffff; 
            --text: #0f172a; 
            --success: #16a34a; 
            --error: #dc2626;
        }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
        }
        #app { 
            background: var(--card); 
            max-width: 750px; 
            width: 100%; 
            padding: 35px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); 
        }
        .header { 
            border-bottom: 2px solid #e2e8f0; 
            margin-bottom: 20px; 
            padding-bottom: 15px; 
            text-align: center;
        }
        .progress-container { 
            height: 10px; 
            background: #e2e8f0; 
            border-radius: 5px; 
            margin: 20px 0; 
            overflow: hidden; 
        }
        #progress-bar { 
            height: 100%; 
            background: var(--secondary); 
            width: 0%; 
            transition: width 0.4s ease; 
        }
        .question { 
            font-size: 1.3rem; 
            font-weight: 700; 
            margin-bottom: 20px; 
            line-height: 1.4; 
        }
        .options { 
            display: grid; 
            gap: 12px; 
        }
        .option-btn { 
            padding: 16px; 
            border: 2px solid #e2e8f0; 
            border-radius: 10px; 
            background: white; 
            cursor: pointer; 
            text-align: left; 
            font-size: 1rem; 
            transition: all 0.2s; 
            color: var(--text);
        }
        .option-btn:hover:not(:disabled) { 
            border-color: var(--secondary); 
            background: #eef2ff; 
        }
        .correct { 
            background: var(--success) !important; 
            color: white; 
            border-color: var(--success); 
        }
        .wrong { 
            background: var(--error) !important; 
            color: white; 
            border-color: var(--error); 
        }
        #feedback { 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 8px; 
            display: none; 
            font-weight: 500; 
            line-height: 1.5;
        }
        .controls { 
            margin-top: 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        #next-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px 30px; 
            border-radius: 8px; 
            font-size: 1rem;
            font-weight: bold; 
            cursor: pointer; 
            display: none; 
            transition: background 0.2s;
        }
        #next-btn:hover {
            background: #4338ca;
        }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <h1 style="margin:0; color:var(--primary)">CC105 Comprehensive Exam</h1>
        <p id="module-tag" style="color:#64748b; font-weight:600; text-transform:uppercase; font-size:0.85rem; margin-top:8px;">Loading...</p>
    </div>
    
    <div class="progress-container"><div id="progress-bar"></div></div>
    <p id="q-counter" style="font-size: 0.95rem; color: #64748b; font-weight: bold;">Question 1 of 20</p>

    <div id="quiz-content">
        <div class="question" id="q-text"></div>
        <div class="options" id="opt-container"></div>
        <div id="feedback"></div>
    </div>

    <div class="controls">
        <span id="score-display" style="font-weight: bold; font-size: 1.1rem; color: var(--primary);">Score: 0</span>
        <button id="next-btn">Next Question →</button>
    </div>
</div>

<script>
    const questions = [
        {
            module: "Topic 1: Data Mining",
            q: "Which best defines Data Mining?",
            opts: ["Manually entering data into a spreadsheet.", "The scientific process of exploring large volumes of data to find hidden patterns.", "Backing up a database to a physical drive.", "Creating a website to sell products online."],
            ans: 1,
            [cite_start]info: "Data mining is the scientific process of exploring large volumes of data to find meaningful patterns, relationships, trends, and useful insights[cite: 11]."
        },
        {
            module: "Topic 1: Data Mining",
            q: "In the 'Gold Mining' analogy, what represents the 'Gold'?",
            opts: ["Raw data points.", "The database server.", "Meaningful patterns and useful insights.", "The software developer."],
            ans: 2,
            [cite_start]info: "Data mining involves extracting valuable information from massive data, just like mining gold from rock[cite: 15]."
        },
        {
            module: "Topic 1: Data Mining",
            q: "Which of the following is NOT a field combined in Data Mining?",
            opts: ["Machine Learning", "Database Technology", "Statistics", "Graphic Illustration"],
            ans: 3,
            [cite_start]info: "It combines elements of statistics, machine learning, database technology, and data analytics[cite: 12]. Graphic illustration is not one of them."
        },
        {
            module: "Topic 1: The KDD Process",
            q: "What is the correct sequence for the 5 steps of the Data Mining Process?",
            opts: ["Selection → Preprocessing → Transformation → Data Mining → Evaluation", "Data Mining → Selection → Evaluation → Transformation → Preprocessing", "Transformation → Selection → Data Mining → Preprocessing → Evaluation", "Selection → Evaluation → Transformation → Data Mining → Preprocessing"],
            ans: 0,
            [cite_start]info: "The process flows systematically: Selecting, Preprocessing, Transformation, Data Mining, and Evaluation & Interpretation[cite: 86, 87, 88, 89, 90]."
        },
        {
            module: "Topic 1: The KDD Process",
            q: "Which step involves handling missing values and removing noisy data?",
            opts: ["Selection", "Preprocessing", "Evaluation", "Transformation"],
            ans: 1,
            [cite_start]info: "Preprocessing includes removing noisy data, handling missing entries, eliminating duplicates, and correcting formats[cite: 96]."
        },
        {
            module: "Topic 1: Data Mining vs ML",
            q: "Data Mining differs from Machine Learning because it primarily focuses on:",
            opts: ["Making future predictions", "Discovering hidden patterns/knowledge", "Developing software code", "Building hardware"],
            ans: 1,
            [cite_start]info: "Data Mining focuses on discovering knowledge, while Machine Learning focuses on building predictive models[cite: 108]."
        },
        {
            module: "Topic 1: Information Security",
            q: "In Information Security, what does 'Integrity' ensure?",
            opts: ["Information is available to authorized users only.", "Information is not modified or tampered with by unauthorized parties.", "The system is always running and accessible.", "The sender cannot deny sending a message."],
            ans: 1,
            [cite_start]info: "Integrity verifies data consistency and ensures it hasn't been accidentally corrupted or tampered with[cite: 126]."
        },
        {
            module: "Topic 1: Cyber Law",
            q: "Which Philippine law is known as the Cybercrime Prevention Act of 2012?",
            opts: ["RA 8792", "RA 10173", "RA 10175", "RA 9165"],
            ans: 2,
            [cite_start]info: "RA 10175 is the Cybercrime Prevention Act of 2012[cite: 140]."
        },
        {
            module: "Module 2: Information Systems",
            q: "What are the 5 main components of an Information System (IS)?",
            opts: ["Hardware, Software, People, Networks, Data", "Electricity, Hardware, Internet, Screens, Users", "Marketing, Finance, HR, Sales, IT", "Input, Output, Storage, Processing, Logic"],
            ans: 0,
            [cite_start]info: "An IS is a combination of people, hardware, software, communication networks, and data resources[cite: 160, 167, 168, 170, 171, 172]."
        },
        {
            module: "Module 2: Information Life Cycle",
            q: "Which phase involves the permanent removal of data from all systems?",
            opts: ["Archival / Deletion", "Maintenance", "Storage / Organization", "Use / Distribution"],
            ans: 0,
            [cite_start]info: "The Archival / Deletion phase involves archiving data for compliance or permanently deleting it when no longer needed[cite: 191, 192]."
        },
        {
            module: "Module 2: Information Architecture",
            q: "What is the primary purpose of Information Architecture (IA)?",
            opts: ["To design the physical office space.", "To organize and structure data to support business goals.", "To repair broken computer hardware.", "To manage social media accounts."],
            ans: 1,
            [cite_start]info: "Information Architecture is the structural design of shared information environments meant to support business goals[cite: 152, 231, 232]."
        },
        {
            module: "Module 2: Metadata",
            q: "'Business Metadata' for an e-commerce platform like Lazada would include:",
            opts: ["SQL code for the database.", "The physical location of the server.", "The business definition of a 'Delivered Order'.", "The CPU speed of the user's phone."],
            ans: 2,
            [cite_start]info: "Business Metadata defines the meaning and purpose of data in business terms, such as what constitutes a 'Delivered Order'[cite: 238, 239]."
        },
        {
            module: "Module 2: Data Dictionary",
            q: "A Data Dictionary is primarily used to:",
            opts: ["List all employees in a company.", "Ensure consistent data definitions across the organization.", "Translate technical terms into different languages.", "Store the physical passwords of all users."],
            ans: 1,
            [cite_start]info: "It ensures consistent data definition across an organization and reduces misunderstandings[cite: 237]."
        },
        {
            module: "Module 2: Taxonomies",
            q: "Which structure follows a strict parent-child tree hierarchy?",
            opts: ["Ontology", "Knowledge Graph", "Taxonomy", "Database Schema"],
            ans: 2,
            [cite_start]info: "A taxonomy is a linear, hierarchical classification system that follows a strict tree structure (Parent-Child)[cite: 249, 254]."
        },
        {
            module: "Module 2: Data Hierarchy",
            q: "In the Data Hierarchy, what level represents individual business objects like 'Customer' or 'Product'?",
            opts: ["Subject Area", "Domain", "Entity", "Attribute"],
            ans: 2,
            [cite_start]info: "Entities are the individual business objects, like a Customer, Product, or Order[cite: 255]."
        },
        {
            module: "Module 2: Data Warehousing",
            q: "Which schema features a central Fact Table surrounded directly by denormalized Dimension Tables?",
            opts: ["Snowflake Schema", "Star Schema", "Hierarchical Schema", "Linear Schema"],
            ans: 1,
            [cite_start]info: "The Star Schema features a Fact table at the center surrounded by denormalized dimension tables in a star pattern[cite: 257, 258]."
        },
        {
            module: "Module 2: Data Warehousing",
            q: "What does 'Non-volatile' mean in the context of a Data Warehouse?",
            opts: ["Data changes every few seconds.", "Data is read-only once loaded and updated via batch loads.", "Data is automatically deleted after 24 hours.", "Data can only be accessed by one person at a time."],
            ans: 1,
            info: "Non-volatile means data is read-only once loaded. [cite_start]Updates happen through periodic batch loads, not real-time transactions[cite: 245]."
        },
        {
            module: "Topic 1: Information Security",
            q: "'Non-repudiation' is a concept heavily tied to which security principle?",
            opts: ["Confidentiality", "Integrity", "Availability", "Accountability"],
            ans: 1,
            [cite_start]info: "Non-repudiation ensures a sender cannot deny actions, tying directly to the Integrity principle[cite: 126]."
        },
        {
            module: "Topic 1: Cyber Threats",
            q: "Which cybersecurity threat involves tricking users into revealing credentials through deceptive emails or SMS?",
            opts: ["SQL Injection", "Phishing", "DDoS", "Ransomware"],
            ans: 1,
            [cite_start]info: "Phishing uses social engineering attacks that trick users into revealing credentials via deceptive emails, SMS, or calls[cite: 130]."
        },
        {
            module: "Module 2: Business Application",
            q: "Evaluating the impact of information and optimizing processes helps an organization achieve:",
            opts: ["Higher Data Redundancy", "Competitive Advantage", "Increased Data Noise", "Information Silos"],
            ans: 1,
            [cite_start]info: "Evaluating the impact of information on organizations improves efficiency, decision-making, and creates a competitive advantage[cite: 157]."
        }
    ];

    let currentIdx = 0;
    let score = 0;

    const qText = document.getElementById('q-text');
    const optCont = document.getElementById('opt-container');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const progress = document.getElementById('progress-bar');
    const qCounter = document.getElementById('q-counter');
    const scoreDisplay = document.getElementById('score-display');
    const moduleTag = document.getElementById('module-tag');

    function loadQuestion() {
        const current = questions[currentIdx];
        qText.innerText = current.q;
        moduleTag.innerText = current.module;
        optCont.innerHTML = '';
        feedback.style.display = 'none';
        nextBtn.style.display = 'none';
        
        qCounter.innerText = `Question ${currentIdx + 1} of ${questions.length}`;
        progress.style.width = `${((currentIdx) / questions.length) * 100}%`;

        current.opts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i);
            optCont.appendChild(btn);
        });
    }

    function checkAnswer(selected) {
        const correct = questions[currentIdx].ans;
        const buttons = document.querySelectorAll('.option-btn');
        
        buttons.forEach(b => b.disabled = true);
        
        if(selected === correct) {
            buttons[selected].classList.add('correct');
            score++;
            scoreDisplay.innerText = `Score: ${score}`;
            feedback.style.background = '#dcfce7';
            feedback.style.color = '#166534';
            feedback.innerHTML = `<strong>✅ Correct!</strong> <br> ${questions[currentIdx].info}`;
        } else {
            buttons[selected].classList.add('wrong');
            buttons[correct].classList.add('correct');
            feedback.style.background = '#fee2e2';
            feedback.style.color = '#991b1b';
            feedback.innerHTML = `<strong>❌ Incorrect.</strong> <br> ${questions[currentIdx].info}`;
        }
        
        feedback.style.display = 'block';
        nextBtn.style.display = 'block';
    }

    nextBtn.onclick = () => {
        currentIdx++;
        if(currentIdx < questions.length) {
            loadQuestion();
        } else {
            showFinalScore();
        }
    };

    function showFinalScore() {
        progress.style.width = '100%';
        qCounter.innerText = "Quiz Complete";
        moduleTag.innerText = "Results";
        
        const percent = Math.round((score / questions.length) * 100);
        let message = "";
        
        if (percent >= 90) message = "Outstanding! You've mastered these modules.";
        else if (percent >= 75) message = "Great job! You have a solid understanding of the material.";
        else if (percent >= 50) message = "Good effort. Review the PDFs to catch the details you missed.";
        else message = "Keep studying! Review the course material and try again.";

        document.getElementById('quiz-content').innerHTML = `
            <div style="text-align:center; padding: 30px 10px;">
                <h2 style="font-size:2.5rem; margin-bottom: 10px; color: var(--text);">Final Score</h2>
                <div style="font-size:4rem; font-weight: bold; color: var(--primary); margin: 20px 0;">
                    ${score} / ${questions.length}
                </div>
                <p style="font-size:1.2rem; font-weight: bold; color: #475569;">${percent}% Accuracy</p>
                <p style="font-size:1.1rem; margin-top: 15px; color: var(--text);">${message}</p>
                
                <button onclick="location.reload()" style="margin-top: 30px; background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s;">
                    Retake Quiz
                </button>
            </div>
        `;
        nextBtn.style.display = 'none';
        scoreDisplay.style.display = 'none';
    }

    // Start Quiz
    loadQuestion();
</script>
</body>
</html>
